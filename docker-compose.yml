services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamkit-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      API_KEY: ${API_KEY:-}
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
